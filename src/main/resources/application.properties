# Database Configuration (H2 File-based)
spring.datasource.url=jdbc:h2:file:./data/db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Logging Configuration (Clean output for CLI)
logging.level.root=WARN
logging.level.com.autobuy=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Application Specific Configurations
spring.config.import=optional:file:secrets.properties
autobuy.secrets-path=secrets.properties
autobuy.backup-dir=./data/backups
autobuy.playwright.headful=true
